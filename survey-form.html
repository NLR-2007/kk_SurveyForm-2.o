<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Survey - Kisaan Krushi</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="padding: 30px 15px;">
        <div class="survey-card card">
            <div class="header">
                <div style="flex: 1; min-width: 0;">
                    <h1 style="font-size: 1.8rem; margin-bottom: 5px; color: var(--text-color);"><i class="fa-solid fa-leaf" style="color: var(--primary-color);"></i> Kisaan Krushi Survey</h1>
                    <p style="color: var(--text-light); margin: 0;">Fill in all required details</p>
                </div>
                <a href="surveyor-dashboard.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
            </div>

            <form id="survey-form">
                <!-- Basic Info -->
                <h3 class="mb-2" style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Basic Information</h3>
                <div class="form-row">
                    <div class="input-group">
                        <label for="farmer-name">Farmer Name *</label>
                        <input type="text" id="farmer-name" required>
                    </div>
                    <div class="input-group">
                        <label for="phone">Phone Number *</label>
                        <input type="tel" id="phone" pattern="[0-9]{10}" placeholder="10 digit number" required>
                    </div>
                </div>

                <!-- Location Info -->
                <h3 class="mt-3 mb-2" style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Location Details</h3>
                <div class="form-row">
                    <div class="input-group">
                        <label for="state">State *</label>
                        <select id="state" required>
                            <option value="">Select State</option>
                            <option value="Andhra Pradesh">Andhra Pradesh</option>
                            <option value="Telangana">Telangana</option>
                            <!-- add more as needed -->
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="district">District *</label>
                        <input type="text" id="district" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="input-group">
                        <label for="mandal">Mandal/Block *</label>
                        <input type="text" id="mandal" required>
                    </div>
                    <div class="input-group">
                        <label for="village">Village *</label>
                        <input type="text" id="village" required>
                    </div>
                </div>

                <div class="input-group mt-2">
                    <label>GPS Location *</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <button type="button" class="btn btn-secondary" id="get-location-btn"><i class="fa-solid fa-location-dot"></i> Get Current Location</button>
                        <span id="location-status" style="font-size: 0.875rem; color: var(--text-light);">Not captured</span>
                    </div>
                    <!-- Hidden inputs to store coordinates -->
                    <input type="hidden" id="latitude" required>
                    <input type="hidden" id="longitude" required>
                </div>

                <!-- Farming Details -->
                <h3 class="mt-3 mb-2" style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Agriculture Details</h3>
                <div class="form-row">
                    <div class="input-group">
                        <label for="crop">Crop Cultivated *</label>
                        <select id="crop" required>
                            <option value="">Select Crop</option>
                            <option value="Paddy">Paddy / Rice</option>
                            <option value="Cotton">Cotton</option>
                            <option value="Maize">Maize</option>
                            <option value="Groundnut">Groundnut</option>
                            <option value="Chilli">Chilli</option>
                            <option value="Sugarcane">Sugarcane</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="land-size">Land Size (Acres) *</label>
                        <input type="number" step="0.1" min="0.1" id="land-size" required>
                    </div>
                </div>

                <div class="input-group mt-2">
                    <label for="suggestion">Farmer's Suggestion / Feedback</label>
                    <textarea id="suggestion" rows="4"></textarea>
                </div>

                <!-- Media Capture -->
                <h3 class="mt-3 mb-2" style="border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">Media Uploads</h3>
                
                <div class="media-capture">
                    <label style="display:block; margin-bottom: 10px; font-weight: 500;">Photo with Farmer *</label>
                    <input type="file" id="photo-input" accept="image/*" capture="environment" style="display: none;" required>
                    <button type="button" class="btn btn-outline" id="trigger-photo-btn"><i class="fa-solid fa-camera"></i> Capture Photo</button>
                    <div class="mt-2 text-center">
                        <img id="photo-preview" class="media-preview hidden" src="" alt="Captured Photo">
                    </div>
                </div>

                <div class="media-capture">
                    <label style="display:block; margin-bottom: 10px; font-weight: 500;">Audio Suggestion Recording</label>
                    <div style="display: flex; gap: 10px; justify-content: center;">
                        <button type="button" class="btn btn-outline" id="start-record-btn" style="color: var(--error-color); border-color: var(--error-color);"><i class="fa-solid fa-microphone"></i> Start Recording</button>
                        <button type="button" class="btn btn-secondary hidden" id="stop-record-btn"><i class="fa-solid fa-stop"></i> Stop</button>
                    </div>
                    <div class="mt-2 hidden" id="audio-playback-container">
                        <audio id="audio-preview" controls class="mt-1"></audio>
                        <p style="font-size: 0.8rem; color: var(--success-color);">Audio recorded successfully.</p>
                    </div>
                </div>

                <div style="margin-top: 40px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                    <button type="submit" class="btn btn-primary" id="submit-survey-btn" style="width: 100%; font-size: 1.125rem; padding: 16px;">
                        <span id="submit-text">Submit Survey</span>
                        <i class="fa-solid fa-spinner fa-spin hidden" id="submit-spinner"></i>
                    </button>
                </div>
            </form>
            
            <div class="nlr-footer mt-3">
                Developed By NLR Group of Company
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/survey.js"></script>
</body>
</html>
