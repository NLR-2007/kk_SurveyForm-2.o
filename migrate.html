<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migrate Firebase to Google Sheets</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; padding: 20px; text-align: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4caf50; color: white; border: none; border-radius: 4px; margin: 10px; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #log { margin-top: 20px; text-align: left; max-width: 800px; margin-left: auto; margin-right: auto; max-height: 400px; overflow-y: auto; background: #f5f5f5; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>
    <h1>Data Migration Tool</h1>
    <p>This tool will fetch all data from Firebase and insert it into your Google Sheets.</p>
    <div>
        <button id="btn-migrate-surveyors">Migrate Surveyors</button>
        <button id="btn-migrate-admins">Migrate Admins</button>
        <button id="btn-migrate-surveys">Migrate Surveys</button>
    </div>
    <div id="log">Logs will appear here...</div>

    <script type="module" src="js/migrate.js"></script>
</body>
</html>
