<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup - Kisaan Krushi</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-container">
                <i class="fa-solid fa-leaf"></i>
            </div>
            <h2>Kisaan Krushi Setup</h2>
            <p style="color: var(--text-light); margin-bottom: 20px;">Create the First Admin Account</p>
            
            <form id="setup-admin-form">
                <div class="input-group">
                    <label for="admin-name">Full Name</label>
                    <input type="text" id="admin-name" value="Lokesh" required>
                </div>

                <div class="input-group">
                    <label for="admin-email">Email</label>
                    <input type="email" id="admin-email" value="lokesh@kk.com" required>
                </div>
                
                <div class="input-group">
                    <label for="admin-password">Password</label>
                    <input type="text" id="admin-password" value="aadhayareddy" required minlength="6">
                </div>
                
                <button type="submit" class="btn btn-primary" id="setup-btn">
                    <span id="setup-text">Create Admin</span>
                    <i class="fa-solid fa-spinner fa-spin hidden" id="setup-spinner"></i>
                </button>
            </form>
            
            <p id="setup-message" class="mt-2 hidden" style="font-size: 0.875rem;"></p>
            
            <div class="mt-3">
                <a href="login.html" class="btn btn-outline" style="width: 100%;"><i class="fa-solid fa-arrow-left"></i> Go to Login</a>
            </div>
            <div class="nlr-footer auth-footer">
                Developed By NLR Group of Company
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script type="module">
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-aBhSAfN3-8Vk-1LAYCkhpKBHkflLofPDVS2rI8sXXeQGQu3JxgvMpJYQ2giubccYnQ/exec';

        async function hashPassword(password) {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        document.getElementById('setup-admin-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('admin-name').value.trim();
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value;
            
            const btnText = document.getElementById('setup-text');
            const spinner = document.getElementById('setup-spinner');
            const msg = document.getElementById('setup-message');
            
            msg.classList.add('hidden');
            btnText.classList.add('hidden');
            spinner.classList.remove('hidden');
            
            try {
                const hashedPassword = await hashPassword(password);
                const adminID = `ADM_${Date.now()}`;
                const isAdminCEO = email.toLowerCase() === 'nlr@kk.com' || email.toLowerCase() === 'admin@kk.com';

                const payload = {
                    action: 'create_user',
                    sheetName: 'Admins',
                    rowData: [
                        adminID,
                        name,
                        email,
                        hashedPassword,
                        isAdminCEO ? 'ceo' : 'admin',
                        true,
                        new Date().toISOString()
                    ]
                };

                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const result = await response.json();
                
                if (result.status === 'success') {
                    msg.textContent = "Admin account created in Google Sheets successfully! You can now login.";
                    msg.style.color = "var(--success-color)";
                } else {
                    throw new Error(result.message || "Failed to save to Google Sheets.");
                }
                msg.classList.remove('hidden');
                
            } catch (error) {
                msg.textContent = error.message;
                msg.style.color = "var(--error-color)";
                msg.classList.remove('hidden');
            } finally {
                btnText.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
